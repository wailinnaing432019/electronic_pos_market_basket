<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Electrical POS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .sidebar {
            min-height: 100vh;
            background: #212529;
            color: white;
            width: 250px;
            position: fixed;
        }

        .sidebar a {
            color: #adb5bd;
            text-decoration: none;
            padding: 15px 20px;
            display: block;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: #343a40;
            color: white;
            border-left: 4px solid #ffc107;
        }

        .main-content {
            margin-left: 250px;
            padding: 30px;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h4 class="text-center py-4 text-warning fw-bold">ADMIN PANEL</h4>
        <a href="{{ url_for('admin_dashboard') }}" class="{{ 'active' if request.path == '/admin/dashboard' }}">
            <i class="bi bi-speedometer2 me-2"></i> Dashboard
        </a>
        <a href="{{ url_for('admin_products') }}" class="{{ 'active' if request.path == '/admin/products' }}">
            <i class="bi bi-box-seam me-2"></i> Products (CRUD)
        </a>
        <a href="{{ url_for('admin_orders') }}" class="{{ 'active' if request.path == '/admin/orders' }}">
            <i class="bi bi-cart-check me-2"></i> Orders List
        </a>
        <hr>
        <a href="{{ url_for('admin_logout') }}" class="text-danger">
            <i class="bi bi-box-arrow-left me-2"></i> Logout
        </a>
    </div>

    <div class="main-content">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show border-0 shadow-sm">{{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
